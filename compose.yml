x-neko-app-env: &neko-app-env
  HOME: /tmp/openneko-home
  TMPDIR: /tmp/openneko-tmp
  XDG_CONFIG_HOME: /config
  XDG_CACHE_HOME: /tmp/openneko-home/.cache
  XDG_DATA_HOME: /tmp/openneko-home/.local/share
  XDG_STATE_HOME: /tmp/openneko-home/.local/state
  NEKO_PG_HOST: neko-db
  NEKO_PG_PORT: "5432"
  NEKO_PG_USER: neko
  NEKO_PG_PASSWORD: secret
  NEKO_PG_DATABASE: neko
  NO_PROXY: localhost,127.0.0.1,::1,neko-db,worker,web,neko-graphjin,graphjin,adventureworks-db,host.docker.internal,host.internal
  no_proxy: localhost,127.0.0.1,::1,neko-db,worker,web,neko-graphjin,graphjin,adventureworks-db,host.docker.internal,host.internal

services:
  neko-db:
    # pgvector image — base postgres:16 + the vector extension preinstalled.
    # work_memory.embedding stores 384-dim vectors from transformers.js
    # (Xenova/all-MiniLM-L6-v2) for context-based memory retrieval.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: neko
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: neko
    ports:
      - "${OPENNEKO_DB_PORT:-5432}:5432"
    volumes:
      - neko-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U neko -d neko
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: applies SQL migrations to neko-db and exits. Every long-
  # running service (web, worker, neko-graphjin) depends on this completing
  # successfully, so by the time they start the schema is in place.
  neko-migrate:
    build:
      context: .
      target: neko-cli
    restart: "no"
    command: ["migrate"]
    depends_on:
      neko-db:
        condition: service_healthy
    # NEKO_PG_PASSWORD here is the bootstrap fallback only — once /setup
    # rotates the password the openneko CLI's defaultConn reads it from
    # /config/openneko/config.json on the shared volume. Without this volume
    # mount, re-`compose up` after rotation would fail with stale creds.
    environment:
      NEKO_PG_HOST: neko-db
      NEKO_PG_PORT: "5432"
      NEKO_PG_USER: neko
      NEKO_PG_PASSWORD: ${NEKO_PG_PASSWORD:-secret}
      NEKO_PG_DATABASE: neko
      XDG_CONFIG_HOME: /config
    volumes:
      - ${OPENNEKO_CONFIG_VOLUME:-openneko-config}:/config/openneko:ro

  neko-graphjin:
    build:
      context: .
      target: neko-graphjin
    restart: unless-stopped
    depends_on:
      # neko-db must be reachable for graphjin to connect; neko-migrate must
      # have finished so graphjin's schema cache reflects all pending
      # migrations. db_schema_poll_duration: 10s in neko.yml also picks up
      # post-boot migrations, but the explicit dep keeps first-boot
      # deterministic.
      neko-db:
        condition: service_healthy
      neko-migrate:
        condition: service_completed_successfully
    # The custom entrypoint reads the password from /openneko-config/config.json
    # (written by the worker entrypoint + the /setup wizard) on every container
    # start, so password rotation works after a simple `docker compose restart
    # neko-graphjin`. NEKO_PG_PASSWORD here is the bootstrap fallback used the
    # very first time, before config.json exists.
    #
    # OPENNEKO_CONFIG_VOLUME selects the source of /openneko-config. Default is
    # the named volume `openneko-config`, shared with web+worker when they too
    # run in compose. In host-hybrid dev (`pnpm dev:up`), it's overridden to the
    # operator's `$HOME/.config/openneko` so host web/worker and in-Docker
    # graphjin share the same physical config.json without a manual sync.
    environment:
      NEKO_PG_PASSWORD: ${NEKO_PG_PASSWORD:-secret}
    volumes:
      - ${OPENNEKO_CONFIG_VOLUME:-openneko-config}:/openneko-config:ro
    ports:
      - "${OPENNEKO_GRAPHJIN_PORT:-8089}:8089"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8089/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      target: web
    depends_on:
      # Schema is guaranteed ready by neko-migrate before web boots.
      neko-migrate:
        condition: service_completed_successfully
      neko-graphjin:
        condition: service_started
    environment:
      <<: *neko-app-env
      WORKER_ADMIN_URL: http://worker:4100
      OPENNEKO_RESTART_WEB_ON_PASSWORD_CHANGE: "1"
      OPENNEKO_GRAPHJIN_URL: http://neko-graphjin:8089
    ports:
      - "${OPENNEKO_PORT:-3000}:8080"
    volumes:
      - openneko-config:/config/openneko
      - openneko-graphjin-cli:/config/graphjin
      - openneko-agent-home:/tmp/openneko-home
      - openneko-agent-tmp:/tmp/openneko-tmp
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    depends_on:
      # Schema is guaranteed ready by neko-migrate before worker boots.
      neko-migrate:
        condition: service_completed_successfully
    environment:
      <<: *neko-app-env
      OPENNEKO_GRAPHJIN_URL: http://neko-graphjin:8089
      # Plugin manifest + per-user secrets live on the openneko-config
      # volume, not under /app (which is read-only-ish post-build). The
      # vendored `openneko` CLI on PATH writes to these same paths, so
      # `openneko install …` from inside the worker hot-loads on the
      # next action_request without a rebuild. Default config dir is
      # /config so secrets land at /config/openneko/secrets.json.
      OPENNEKO_PLUGINS_MANIFEST_PATH: /config/openneko/plugins.json
    expose:
      - "4100"
    volumes:
      - openneko-config:/config/openneko
      - openneko-graphjin-cli:/config/graphjin
      - openneko-agent-home:/tmp/openneko-home
      - openneko-agent-tmp:/tmp/openneko-tmp
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4100/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  neko-db-data:
  openneko-config:
  openneko-graphjin-cli:
  openneko-agent-home:
  openneko-agent-tmp:
