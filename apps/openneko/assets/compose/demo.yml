# Demo overlay: AdventureWorks trial bundle. Spins up a second Postgres for
# the AdventureWorks dataset, the one-shot CSV loader, the data-source
# GraphJin (image: dosco/graphjin) over the AdventureWorks data, a config-
# init step that seeds graphjin's dev.yml from the baked worker image, and
# the neko-side seed step that wires demo workflows into the operator's
# neko-db. Image-pinned variants of the services in compose.adventureworks.yml.
services:
  adventureworks-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CUSTOMER_PGUSER:-postgres}
      POSTGRES_PASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      POSTGRES_DB: ${ADVENTUREWORKS_DB:-adventureworks}
    volumes:
      - adventureworks-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CUSTOMER_PGUSER:-postgres} -d ${ADVENTUREWORKS_DB:-adventureworks}"]
      interval: 5s
      timeout: 5s
      retries: 20

  adventureworks-init:
    # Uses the worker image with the baked AdventureWorks loader
    # (db/load-adventureworks-baked.sh + apps/worker/scripts/load-adventureworks.ts).
    # No separate image needed — the worker image already has node, tsx,
    # pg, curl, unzip, and postgresql-client.
    image: ghcr.io/open-neko/neko-worker:${OPENNEKO_VERSION:-latest}
    depends_on:
      adventureworks-db:
        condition: service_healthy
    environment:
      PGHOST: adventureworks-db
      PGPORT: 5432
      PGUSER: ${CUSTOMER_PGUSER:-postgres}
      PGPASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      ADVENTUREWORKS_DB: ${ADVENTUREWORKS_DB:-adventureworks}
      ADVENTUREWORKS_CACHE_DIR: /cache
    entrypoint: ["/bin/sh", "/app/db/load-adventureworks-baked.sh"]
    volumes:
      - adventureworks-cache:/cache
    restart: "no"

  graphjin-config-init:
    # Uses the worker image because it already has db/graphjin/dev.example.yml
    # baked in. Source compose uses alpine + bind-mount of the repo's yml;
    # for binary distribution we use the worker image instead so no host
    # path is needed.
    image: ghcr.io/open-neko/neko-worker:${OPENNEKO_VERSION:-latest}
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -f /config/dev.yml ]; then
          cp /app/db/graphjin/dev.example.yml /config/dev.yml
        fi
        chmod -R a+rwX /config
    volumes:
      - graphjin-config:/config
    restart: "no"

  graphjin:
    # Data-source GraphJin over the AdventureWorks DB. This is what the
    # setup wizard's "GraphJin URL" defaults to (http://graphjin:8080).
    # Distinct from neko-graphjin (over neko-db, for subscriptions).
    image: dosco/graphjin:3.18.25
    restart: unless-stopped
    depends_on:
      adventureworks-init:
        condition: service_completed_successfully
      graphjin-config-init:
        condition: service_completed_successfully
    ports:
      - "${GRAPHJIN_PORT:-8080}:8080"
    environment:
      GJ_DATABASE_HOST: adventureworks-db
      GJ_DATABASE_PORT: 5432
      GJ_DATABASE_USER: ${CUSTOMER_PGUSER:-postgres}
      GJ_DATABASE_PASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      GJ_DATABASE_DBNAME: ${ADVENTUREWORKS_DB:-adventureworks}
      NO_PROXY: localhost,127.0.0.1,::1,adventureworks-db,graphjin,neko-db,worker,web,host.docker.internal,host.internal
      no_proxy: localhost,127.0.0.1,::1,adventureworks-db,graphjin,neko-db,worker,web,host.docker.internal,host.internal
    volumes:
      - graphjin-config:/config
    command: ["serve", "--path", "/config"]

  neko-adventureworks-seed:
    image: ghcr.io/open-neko/neko-worker:${OPENNEKO_VERSION:-latest}
    depends_on:
      neko-db:
        condition: service_healthy
      adventureworks-init:
        condition: service_completed_successfully
    environment:
      XDG_CONFIG_HOME: /config
      NEKO_PG_HOST: neko-db
      NEKO_PG_PORT: "5432"
      NEKO_PG_USER: neko
      NEKO_PG_PASSWORD: secret
      NEKO_PG_DATABASE: neko
    volumes:
      - openneko-config:/config/openneko
    command: ["node", "packages/db/src/seed-adventureworks.mjs"]
    restart: "no"

  adventureworks-simulator:
    # Trickles realistic sales orders into the AdventureWorks DB on a
    # schedule so the workspace reacts during a trial (briefing numbers
    # drift, cron workflows fire, runs accumulate). Set AW_SIM_ENABLED=0
    # to disable. Uses the worker image because psql + the tick script
    # are already baked in at /app/db/seeds/dev/aw-sim-tick.sql; no
    # bind-mount of repo files needed for the packaged install.
    image: ghcr.io/open-neko/neko-worker:${OPENNEKO_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      adventureworks-init:
        condition: service_completed_successfully
    environment:
      PGHOST: adventureworks-db
      PGPORT: 5432
      PGUSER: ${CUSTOMER_PGUSER:-postgres}
      PGPASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      PGDATABASE: ${ADVENTUREWORKS_DB:-adventureworks}
      AW_SIM_INTERVAL_SEC: ${AW_SIM_INTERVAL_SEC:-600}
      AW_SIM_ORDERS_MIN: ${AW_SIM_ORDERS_MIN:-3}
      AW_SIM_ORDERS_MAX: ${AW_SIM_ORDERS_MAX:-10}
      AW_SIM_ENABLED: ${AW_SIM_ENABLED:-1}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ "$${AW_SIM_ENABLED}" != "1" ]; then
          echo "[aw-sim] AW_SIM_ENABLED=$${AW_SIM_ENABLED}; sleeping forever"
          exec tail -f /dev/null
        fi
        echo "[aw-sim] starting: interval=$${AW_SIM_INTERVAL_SEC}s, orders=$${AW_SIM_ORDERS_MIN}-$${AW_SIM_ORDERS_MAX} per tick"
        while true; do
          ORDERS=$$(awk -v mn=$${AW_SIM_ORDERS_MIN} -v mx=$${AW_SIM_ORDERS_MAX} 'BEGIN{srand(); print int(mn + rand()*(mx-mn+1))}')
          psql -v ON_ERROR_STOP=1 -c "SET trial_sim.orders_per_tick TO '$$ORDERS'" -f /app/db/seeds/dev/aw-sim-tick.sql \
            || echo "[aw-sim] tick failed; will retry next interval"
          sleep "$${AW_SIM_INTERVAL_SEC}"
        done

  adventureworks-scenario-injector:
    # L3 scripted-scenario scheduler. On startup: bootstraps trial_sim
    # schema, then runs advance-dates.sql so demo dates land on or after
    # CURRENT_DATE (idempotent — gated to once per 12 hours via
    # trial_sim.state.advance_dates_at). Then loops the scenario
    # scheduler. Set TRIAL_SIM_ENABLED=0 to disable. Uses the worker
    # image because all scripts + scenarios + psql are baked at
    # /app/db/seeds/dev/.
    image: ghcr.io/open-neko/neko-worker:${OPENNEKO_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      adventureworks-init:
        condition: service_completed_successfully
    environment:
      PGHOST: adventureworks-db
      PGPORT: 5432
      PGUSER: ${CUSTOMER_PGUSER:-postgres}
      PGPASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      PGDATABASE: ${ADVENTUREWORKS_DB:-adventureworks}
      TRIAL_SIM_TICK_SEC: ${TRIAL_SIM_TICK_SEC:-300}
      TRIAL_SIM_ENABLED: ${TRIAL_SIM_ENABLED:-1}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ "$${TRIAL_SIM_ENABLED}" != "1" ]; then
          echo "[trial-sim] TRIAL_SIM_ENABLED=$${TRIAL_SIM_ENABLED}; sleeping forever"
          exec tail -f /dev/null
        fi
        exec /bin/sh /app/db/seeds/dev/scenario-injector.sh loop

  web:
    depends_on:
      graphjin:
        condition: service_started
    environment:
      # Trial default: route every external action (e.g. send_webhook) to
      # the mock adapter so bundled workflows can propose Slack alerts
      # without hitting real endpoints. Flip to "false" once you're past
      # trial and have wired real webhooks.
      NEKO_ACTIONS_DRY_RUN: ${NEKO_ACTIONS_DRY_RUN:-true}

  worker:
    depends_on:
      graphjin:
        condition: service_started
    environment:
      NEKO_ACTIONS_DRY_RUN: ${NEKO_ACTIONS_DRY_RUN:-true}

volumes:
  adventureworks-db-data:
  adventureworks-cache:
  graphjin-config:
