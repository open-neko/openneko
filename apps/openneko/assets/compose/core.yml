# Embedded core compose. The `openneko` binary materializes this and overlays
# dev.yml / demo.yml depending on `openneko start --mode`. Image tags are
# pinned to the binary's release version via the ${OPENNEKO_VERSION} env var
# (set by the supervisor before invoking docker compose). Operators who want
# to build from source should use the repo-root compose.yml instead.
x-neko-app-env: &neko-app-env
  HOME: /tmp/openneko-home
  TMPDIR: /tmp/openneko-tmp
  XDG_CONFIG_HOME: /config
  XDG_CACHE_HOME: /tmp/openneko-home/.cache
  XDG_DATA_HOME: /tmp/openneko-home/.local/share
  XDG_STATE_HOME: /tmp/openneko-home/.local/state
  NEKO_PG_HOST: neko-db
  NEKO_PG_PORT: "5432"
  NEKO_PG_USER: neko
  NEKO_PG_PASSWORD: secret
  NEKO_PG_DATABASE: neko
  NO_PROXY: localhost,127.0.0.1,::1,neko-db,worker,web,neko-graphjin,graphjin,adventureworks-db,host.docker.internal,host.internal
  no_proxy: localhost,127.0.0.1,::1,neko-db,worker,web,neko-graphjin,graphjin,adventureworks-db,host.docker.internal,host.internal

services:
  neko-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: neko
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: neko
    ports:
      - "${OPENNEKO_DB_PORT:-5432}:5432"
    volumes:
      - neko-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U neko -d neko
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: applies SQL migrations to neko-db and exits. Every long-
  # running service (web, worker, neko-graphjin) depends on this completing
  # successfully, so by the time they start the schema is in place. Lives
  # in the tiny neko-cli image (just the openneko Go binary + ca-certs +
  # tini, ~80MB) so it spins up fast.
  neko-migrate:
    image: ghcr.io/open-neko/neko-cli:${OPENNEKO_VERSION:-latest}
    restart: "no"
    command: ["migrate"]
    depends_on:
      neko-db:
        condition: service_healthy
    # NEKO_PG_PASSWORD here is the bootstrap fallback only — once /setup
    # rotates the password the openneko CLI's defaultConn reads it from
    # /config/openneko/config.json on the shared volume. Without this volume
    # mount, re-`compose up` after rotation would fail with stale creds.
    environment:
      NEKO_PG_HOST: neko-db
      NEKO_PG_PORT: "5432"
      NEKO_PG_USER: neko
      NEKO_PG_PASSWORD: ${NEKO_PG_PASSWORD:-secret}
      NEKO_PG_DATABASE: neko
      XDG_CONFIG_HOME: /config
    volumes:
      - openneko-config:/config/openneko:ro

  neko-graphjin:
    image: ghcr.io/open-neko/neko-graphjin:${OPENNEKO_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      # neko-db must be reachable for graphjin to connect; neko-migrate must
      # have finished so the schema graphjin caches at boot reflects all
      # pending migrations. The neko.yml config also sets
      # db_schema_poll_duration: 10s so post-boot migrations are picked up
      # automatically, but the explicit dep keeps first-boot deterministic.
      neko-db:
        condition: service_healthy
      neko-migrate:
        condition: service_completed_successfully
    environment:
      NEKO_PG_PASSWORD: ${NEKO_PG_PASSWORD:-secret}
    volumes:
      - openneko-config:/openneko-config:ro
    ports:
      - "${OPENNEKO_GRAPHJIN_PORT:-8089}:8089"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8089/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: ghcr.io/open-neko/neko-web:${OPENNEKO_VERSION:-latest}
    depends_on:
      # Schema is guaranteed ready by neko-migrate before web boots — no
      # need for web's entrypoint to run migrate itself anymore.
      neko-migrate:
        condition: service_completed_successfully
    environment:
      <<: *neko-app-env
      WORKER_ADMIN_URL: http://worker:4100
      OPENNEKO_RESTART_WEB_ON_PASSWORD_CHANGE: "1"
      OPENNEKO_GRAPHJIN_URL: http://neko-graphjin:8089
    ports:
      - "${OPENNEKO_PORT:-3000}:8080"
    volumes:
      - openneko-config:/config/openneko
      - openneko-graphjin-cli:/config/graphjin
      - openneko-agent-home:/tmp/openneko-home
      - openneko-agent-tmp:/tmp/openneko-tmp
    restart: unless-stopped

  worker:
    image: ghcr.io/open-neko/neko-worker:${OPENNEKO_VERSION:-latest}
    depends_on:
      # Same as web: neko-migrate completes before worker starts, so the
      # entrypoint no longer runs migrate.
      neko-migrate:
        condition: service_completed_successfully
    environment:
      <<: *neko-app-env
      OPENNEKO_GRAPHJIN_URL: http://neko-graphjin:8089
      OPENNEKO_PLUGINS_MANIFEST_PATH: /config/openneko/plugins.json
      # Plugin npm packages install into a dedicated dir, isolated from /app's
      # pnpm-managed node_modules. Both the openneko CLI (via env-var pickup
      # in internal/plugin/install/) and the worker plugin-registry's runner
      # resolver use this path.
      OPENNEKO_PLUGIN_INSTALL_DIR: /var/lib/openneko/plugins
    expose:
      - "4100"
    volumes:
      - openneko-config:/config/openneko
      - openneko-graphjin-cli:/config/graphjin
      - openneko-agent-home:/tmp/openneko-home
      - openneko-agent-tmp:/tmp/openneko-tmp
      - openneko-plugins:/var/lib/openneko/plugins
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4100/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  neko-db-data:
  openneko-config:
  openneko-graphjin-cli:
  openneko-agent-home:
  openneko-agent-tmp:
  openneko-plugins:
