# OpenShell sandbox overlay (opt-in). Runs the agent's plugins — and, with the
# agent-runtime env, the agent itself — in OpenShell sandboxes via a
# containerised gateway with the Docker driver.
#
#   docker compose -f compose.yml -f compose.openshell.yml up
#
# STATUS: VALIDATED end-to-end on the Linux target (neko-vm / GCP, 2026-06-03):
# containerised gateway boots with mTLS, the Docker driver creates a sandbox,
# the supervisor fetches policy + reaches Ready, exec runs, and default-deny
# egress is enforced. On macOS/OrbStack the same compose stalls at JWT delivery
# (see requirement #4) — run it on Linux.
#
# Hard requirements proven during bring-up:
#  1. Docker sandboxes REQUIRE mTLS (JWT + client-cert auth); --disable-tls is a
#     dead end. The certgen init generates the PKI.
#  2. Every path the gateway hands the host daemon as a bind-mount source (the
#     supervisor binary cache, the TLS dir, AND the per-sandbox JWT under HOME)
#     must exist at an IDENTICAL host:container path. One matched mount of the
#     whole state dir covers them; XDG_DATA_HOME / OPENSHELL_LOCAL_TLS_DIR / HOME
#     all point inside it.
#  3. Sandboxes dial the gateway at host.openshell.internal:<port> (= the host).
#     The gateway publishes that exact port; the server cert carries a
#     host.openshell.internal SAN (certgen adds it).
#  4. HOME MUST be a matched host-shared path (NOT /tmp). The gateway writes the
#     per-sandbox JWT under $HOME/.local/state/openshell/... and the driver
#     bind-mounts it to /etc/openshell/auth/sandbox.jwt in the sandbox — so the
#     host daemon must resolve the SAME path. HOME=/tmp (container-internal) →
#     empty bind-mount → the sandbox can't read its JWT and crash-loops.
#  5. The gateway image is DISTROLESS (no /bin/sh): certgen runs the binary
#     directly; the registration-writing is a separate busybox step.
#  6. Sandbox base images must include a `sandbox` user/group AND iproute2 (for
#     the egress netns). The plugin-base + agent images provide both.

services:
  # Generate the mTLS PKI (CA + server + client + JWT signing key). Distroless
  # image → run the binary directly. The state dir is mounted at an identical
  # path so generate-certs' temp-dir rename stays on one device (requirement #2).
  openshell-certgen:
    image: ghcr.io/nvidia/openshell/gateway:${OPENSHELL_VERSION:-0.0.54}
    restart: "no"
    user: "0:0"
    command:
      - generate-certs
      - --output-dir
      - ${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}/pki
      - --server-san
      - host.openshell.internal
      - --server-san
      - openshell-gateway
      - --server-san
      - 127.0.0.1
      - --server-san
      - localhost
    volumes:
      - ${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}:${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}

  # Write the worker's CLI gateway registration (client cert + metadata). Split
  # out of certgen because the gateway image has no shell (requirement #5).
  openshell-reg:
    image: busybox:latest
    restart: "no"
    depends_on:
      openshell-certgen:
        condition: service_completed_successfully
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        PKI=${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}/pki
        # web + worker have XDG_CONFIG_HOME=/config and the CLI reads gateway
        # registrations from $XDG_CONFIG_HOME/openshell — so write to
        # /config/openshell (the shared openshell-config volume), NOT under the
        # openneko-config volume (which mounts at /config/openneko).
        REG=/config/openshell/gateways/openneko
        mkdir -p "$$REG/mtls"
        cp "$$PKI/ca.crt"         "$$REG/mtls/ca.crt"
        cp "$$PKI/client/tls.crt" "$$REG/mtls/tls.crt"
        cp "$$PKI/client/tls.key" "$$REG/mtls/tls.key"
        printf '{"name":"openneko","gateway_endpoint":"https://openshell-gateway:%s","is_remote":false,"gateway_port":0,"auth_mode":"mtls"}\n' "${OPENSHELL_PORT:-18080}" \
          > "$$REG/metadata.json"
        printf 'openneko' > /config/openshell/active_gateway
        chmod -R a+rX /config/openshell
    volumes:
      - ${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}/pki:${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}/pki:ro
      - openshell-config:/config/openshell

  openshell-gateway:
    image: ghcr.io/nvidia/openshell/gateway:${OPENSHELL_VERSION:-0.0.54}
    restart: unless-stopped
    user: "0:0"                       # needs the host docker.sock (use a socket-proxy in prod)
    command:
      - "--bind-address"
      - "0.0.0.0"
      - "--port"
      - "${OPENSHELL_PORT:-18080}"
    depends_on:
      openshell-reg:
        condition: service_completed_successfully
    environment:
      OPENSHELL_DRIVERS: docker
      OPENSHELL_DB_URL: ${OPENSHELL_DB_URL:-postgres://neko:secret@neko-db:5432/neko}
      OPENSHELL_LOCAL_TLS_DIR: ${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}/pki
      XDG_DATA_HOME: ${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}/cache
      # Matched, host-shared HOME (requirement #4) — NOT /tmp.
      HOME: ${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}/home
    ports:
      - "${OPENSHELL_PORT:-18080}:${OPENSHELL_PORT:-18080}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # One matched mount of the whole state dir (pki + cache + home) so every
      # path the gateway hands the daemon resolves identically on the host.
      - ${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}:${OPENSHELL_STATE_DIR:-/var/lib/openneko/openshell}

  # Worker: channel-triggered agent runs + plugins, both in OpenShell sandboxes.
  worker:
    environment:
      OPENNEKO_PLUGIN_BASE_IMAGE: ${OPENNEKO_PLUGIN_BASE_IMAGE:-ghcr.io/open-neko/plugin-base:node20}
      OPENNEKO_AGENT_IMAGE: ${OPENNEKO_AGENT_IMAGE:-ghcr.io/open-neko/agent:${OPENNEKO_VERSION:-latest}}
      # provider / egress host / connecting binary / key-env are derived from the
      # org's model config by provisionHostConfig — no per-deploy egress wiring.
      OPENSHELL_GATEWAY: openneko
      # claude tool-turns reach the control plane via this broker. It listens
      # inside the container but the sandbox dials it at host.openshell.internal,
      # so the port is published to the host (requirement #3). Worker + web run
      # on the same host → distinct ports.
      OPENNEKO_BROKER_PORT: ${OPENNEKO_WORKER_BROKER_PORT:-4199}
    ports:
      - "${OPENNEKO_WORKER_BROKER_PORT:-4199}:${OPENNEKO_WORKER_BROKER_PORT:-4199}"
    volumes:
      - openshell-config:/config/openshell
    depends_on:
      openshell-gateway:
        condition: service_started

  # Web: interactive chat launches the agent in a sandbox too (the Next.js server
  # is the control plane; the agent never runs in-process). Same flags; egress
  # self-derives on the first settings save (provisionHostConfig).
  web:
    environment:
      OPENNEKO_AGENT_IMAGE: ${OPENNEKO_AGENT_IMAGE:-ghcr.io/open-neko/agent:${OPENNEKO_VERSION:-latest}}
      OPENSHELL_GATEWAY: openneko
      OPENNEKO_BROKER_PORT: ${OPENNEKO_WEB_BROKER_PORT:-4198}
    ports:
      - "${OPENNEKO_WEB_BROKER_PORT:-4198}:${OPENNEKO_WEB_BROKER_PORT:-4198}"
    volumes:
      - openshell-config:/config/openshell
    depends_on:
      openshell-gateway:
        condition: service_started

volumes:
  # Holds the worker/web CLI's gateway registration at /config/openshell (the
  # certgen+reg step writes it; the gateway is reached by mTLS service name).
  openshell-config:
