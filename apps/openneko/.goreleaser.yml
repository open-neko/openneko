version: 2

project_name: openneko

before:
  hooks:
    - go mod tidy
    - ./scripts/sync-migrations.sh --check

builds:
  - id: openneko
    main: ./cmd/openneko
    binary: openneko
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/open-neko/neko/apps/openneko/internal/version.Version={{.Version}}

archives:
  - id: openneko
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: open-neko
    name: openneko
  draft: false
  prerelease: auto

# Homebrew distribution. GoReleaser deprecated `brews` (formulae) in favor of
# `homebrew_casks`; casks are now the supported way to ship a prebuilt binary.
homebrew_casks:
  - name: openneko
    # Don't overwrite the tap's pinned stable cask when releasing a prerelease
    # (vX.Y.Z-rc1 etc). "auto" → skip on prerelease tags; stable releases push.
    skip_upload: auto
    repository:
      owner: open-neko
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://openneko.app"
    description: "OpenNeko operator CLI — supervises the stack and manages plugins"
    # The binary isn't code-signed/notarized, so macOS quarantines it on
    # download. Strip the attribute on install so `openneko` runs without a
    # Gatekeeper "cannot be opened" prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/openneko"]
          end
    caveats: |
      OpenNeko needs Docker. Install Docker Desktop (macOS) or Docker Engine (Linux) first.
      `openneko start` materializes its compose file under .openneko/runtime/ in the
      current directory; run it from a working dir you control.

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
