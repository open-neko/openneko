# OpenNeko's own GraphJin instance — exposes the metadata Postgres
# (workflow_definition, workflow_run, workflow_output, observation,
# subscription, etc.) so the worker can subscribe to output-match firings.
#
# This is the OPERATING-LOOP graphjin. It is distinct from the customer-
# data graphjin (compose.adventureworks.yml + db/graphjin/dev.example.yml)
# which serves the agent CLI path. Two graphjins, two purposes, two ports:
#   8089 — neko metadata (this file)
#   8080 — customer source data (dev.example.yml)
#
# Connection: env vars GJ_DATABASE_HOST/_PORT/_NAME/_USER/_PASSWORD set
# at compose time override the defaults below.

app_name: OpenNeko Operating Loop
host_port: 0.0.0.0:8089
production: false
debug: false
log_format: plain
log_level: info
http_compress: true
reload_on_config_change: true

auth:
  type: none
auth_fail_block: false

# Internal-only service; no external CORS callers.
cors_allowed_origins:
  - http://127.0.0.1
  - http://worker
  - http://web

default_limit: 100
enable_tracing: false

# No MCP surface — agents continue using the customer-data graphjin via
# the CLI path. This instance is for the worker process only.
mcp:
  disable: true

# Live schema discovery on boot + poll-based watcher so new operating-
# loop migrations (action_request etc.) get picked up without restarting
# the graphjin container.
db_schema_poll_duration: 10s

# Subscription polling — GraphJin re-runs each subscription's query at
# this cadence and pushes deltas. 5s is GraphJin's minimum.
subs_poll_duration: 5s

# Sensitive columns and tables blocked from query/results.
blocklist:
  - secret
  - password
  - encrypted
  - token
  - llm_provider_config

databases:
  neko:
    type: postgres
    host: neko-db
    port: 5432
    dbname: neko
    user: neko
    password: secret
    pool_size: 10
    max_retries: 3
