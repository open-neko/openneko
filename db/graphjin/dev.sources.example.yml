# GJ4 — source/agentic-mode template for the CUSTOMER-data GraphJin
# (compare dev.example.yml, the legacy anonymous config). Copy to dev.yml,
# fill the secret, and set data_source.auth_mode='jwt' in neko-db to
# activate per-run actor tokens.
#
# The JWT secret is per-org, derived from the deployment secret-key:
#   graphjinSigningSecretB64(orgId)   (packages/llm/src/graphjin/token.ts)
# Claims OpenNeko mints: { sub, role (admin|member|service), org_id,
# iat, exp } — 5-minute TTL, re-minted per run.
#
# NOTE (3.18.32+): in sources mode, GJ_DATABASE_* env vars are a hard
# boot error — connection details live HERE, not in compose env.
#
# OL5 — chat-first config: this CUSTOMER GraphJin enables config updates
# (mcp.allow_config_updates) so an OpenNeko admin can register/shape
# sources, roles, and access from chat. The agent only PROPOSES (its CLI
# guard blocks mutations); the worker applies the approved gj_config
# preview→apply with a minted admin token.
#
# WHERE THE ADMIN-ONLY GUARANTEE COMES FROM: the OpenNeko approval gate
# (source_config_admin actions require approverRole: admin) plus the agent
# CLI mutation guard — NOT the engine. Verified live: the engine's
# `gj_config: admin` root only distinguishes anon from authenticated, so a
# member-role token can still reach gj_config. Treat the root as
# defense-in-depth, not the boundary.
#
# TWO PRECONDITIONS for a durable apply (verified live on the fork):
#   1. roles: must explicitly define every token role (admin, user).
#      gj_config role/source updates re-normalize roles; without explicit
#      entries the implicit admin role is dropped and all tokens break
#      ("roles 'admin' not defined").
#   2. secrets.keystore.key (base64 → 32 bytes) is REQUIRED to register a
#      DB source with a password — GraphJin seals it to a gjsecret:// ref.
# Also note: gj_config apply persists + reloads the config; needs a fork
# build with the saveConfigToDisk fix (dosco/graphjin#601) or the reload
# crash-loops on a spurious top-level database: block.
#
# The OpenNeko INTERNAL neko-graphjin MUST NOT enable any of this:
# keep allow_config_updates:false and no gj_config root there — it is
# never reconfigurable from chat.

app_name: ./Graphjin/Neko-AdventureWorks (source mode)
host_port: 0.0.0.0:8080
production: false
debug: true
log_format: plain
log_level: debug
http_compress: true
reload_on_config_change: true
server_timing: true

auth:
  type: jwt
  jwt:
    # base64 of graphjinSigningSecretB64(orgId)
    secret: "REPLACE_WITH_PER_ORG_SECRET_B64"
    audience: ""
    issuer: ""

# Role shaping (verified live on 3.18.37): JWT roles only take effect
# when they match a configured role or admin_roles; everything else
# falls back to the built-in authenticated role "user".
roles_query: ""
identity:
  user_id_claim: sub
  role_claims:
    - role
  # K3 — multi-tenant isolation: the JWT's org_id claim becomes the
  # namespace ($account_id). Required for `read: account` sources.
  namespace_claim: org_id
  admin_roles:
    - admin

auth_fail_block: true

cors_allowed_origins:
  - '*'

default_limit: 20
enable_tracing: true
subs_poll_duration: 5s

mcp:
  disable: false
  # OL5: makes gj_config.update reachable. The admin-only guarantee is the
  # OpenNeko approval gate + agent CLI guard, not the engine (see header).
  allow_config_updates: true
  allow_mutations: false
  allow_raw_queries: true
  workflow_timeout: 300
  allow_dev_tools: false
  # The legacy /api/v1/discovery/* bridge is OFF: it serves broad schema
  # dumps anonymously. Agentic deployments discover via gj_catalog under
  # the caller's token; the knowledge prefetch does the same.
  legacy_discovery: false

analytics_mode: true

# OL5 precondition 1: define every token role explicitly. gj_config
# role/source updates re-normalize roles; without these the implicit admin
# role is dropped on the first apply and all tokens break.
roles:
  - name: user
    comment: Authenticated user
  - name: admin
    comment: Org admin

# OL5 precondition 2: required to register a DB source with a password —
# GraphJin seals the value to a gjsecret:// ref at apply (plaintext never
# lands on disk). base64 that decodes to 32 bytes; provide via
# GJ_SECRETS_KEYSTORE_KEY in deployment, never commit a real key.
secrets:
  keystore:
    key: "REPLACE_WITH_BASE64_32_BYTE_KEY"

blocklist:
  - ar_internal_metadata
  - schema_migrations
  - secret
  - password
  - encrypted
  - token

sources:
  - name: graphjin
    kind: graphjin
    metadata: true
    catalog: true
    access:
      roots:
        # authenticated, NOT public — verified live: public leaks the
        # whole schema catalog to anonymous callers.
        gj_catalog: authenticated
        # OL5: gates gj_config to authenticated callers (defense-in-depth).
        # NOT a member/admin boundary — the engine treats `admin` as
        # authenticated here; the admin-only guarantee is OpenNeko's
        # approval gate. The worker mints an admin token to apply changes.
        gj_config: admin

  - name: adventureworks
    kind: database
    default: true
    read_only: true
    type: postgres
    host: adventureworks-db
    port: 5432
    dbname: adventureworks
    user: postgres
    password: postgres
    access:
      # `authenticated` = any valid token, no row scoping — right for a
      # single-tenant customer DB like the demo. `account` (K3) is the
      # multi-tenant mode: it auto-filters every query to the JWT's
      # org_id namespace AND blocks tables missing namespace_column
      # (verified live: account mode on a column-less table blocks).
      read: authenticated
      write: blocked
      delete: blocked
      # K3 — switch to multi-tenant isolation:
      # read: account
      # namespace_column: org_id
      # missing_namespace_column: block
