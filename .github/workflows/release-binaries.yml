name: openneko release binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (must already exist; e.g. v0.0.0-rc1)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-image:
    name: ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: neko-web
            target: web
            platform: linux/amd64
            runner: ubuntu-22.04
          - image: neko-web
            target: web
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: neko-worker
            target: worker
            platform: linux/amd64
            runner: ubuntu-22.04
          - image: neko-worker
            target: worker
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: neko-graphjin
            target: neko-graphjin
            platform: linux/amd64
            runner: ubuntu-22.04
          - image: neko-graphjin
            target: neko-graphjin
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: neko-cli
            target: neko-cli
            platform: linux/amd64
            runner: ubuntu-22.04
          - image: neko-cli
            target: neko-cli
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Resolve release tag
        id: tag
        run: echo "value=${{ github.event.inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Compute arch-safe platform key (amd64 / arm64)
        id: archkey
        run: echo "value=${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/open-neko/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ steps.archkey.outputs.value }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ steps.archkey.outputs.value }},mode=max

      - name: Stash digest for the merge step
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.image }}-${{ steps.archkey.outputs.value }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ steps.archkey.outputs.value }}
          path: /tmp/digests/${{ matrix.image }}-${{ steps.archkey.outputs.value }}
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: merge manifest (${{ matrix.image }})
    runs-on: ubuntu-22.04
    needs: build-image
    strategy:
      fail-fast: false
      matrix:
        image: [neko-web, neko-worker, neko-graphjin, neko-cli]
    steps:
      - name: Resolve release tag
        id: tag
        run: echo "value=${{ github.event.inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Download per-arch digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          IMAGE=ghcr.io/open-neko/${{ matrix.image }}
          AMD64=$(cat /tmp/digests/${{ matrix.image }}-amd64)
          ARM64=$(cat /tmp/digests/${{ matrix.image }}-arm64)
          docker buildx imagetools create \
            -t "$IMAGE:${{ steps.tag.outputs.value }}" \
            -t "$IMAGE:latest" \
            "$IMAGE@$AMD64" \
            "$IMAGE@$ARM64"
          docker buildx imagetools inspect "$IMAGE:${{ steps.tag.outputs.value }}"

  goreleaser:
    name: goreleaser
    runs-on: ubuntu-22.04
    needs: merge-manifests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/openneko/go.sum

      - id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: open-neko
          repositories: |
            neko
            homebrew-tap

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: apps/openneko
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
