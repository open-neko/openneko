name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull, build, restart
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GIT_REF: ${{ github.sha }}
          # Slack token piped in from a GitHub secret; the deploy script
          # invokes `openneko secrets set` with it so the running worker
          # picks it up on the next manifest refresh. Empty string is
          # tolerated — the deploy still completes, slack just isn't wired.
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          # NOTE: privileged steps (systemd drop-in, openneko binary install,
          # systemd daemon-reload) live in scripts/neko-vm-setup.sh and are
          # run once manually on the VM. This deploy only does what the
          # SSH_USER can do without prompting for a sudo password.
          ssh -i ~/.ssh/id_ed25519 \
              "$SSH_USER@$SSH_HOST" \
              GIT_REF="$GIT_REF" SLACK_BOT_TOKEN="$SLACK_BOT_TOKEN" \
              bash -se <<'EOF'
            set -euo pipefail
            cd /opt/neko
            git fetch origin main
            git reset --hard "$GIT_REF"
            export AX_SKIP_SKILL_INSTALL=1
            pnpm install --frozen-lockfile
            pnpm build

            set -a
            source .env
            set +a
            pnpm -F @neko/db migrate

            sudo /usr/bin/systemctl restart neko-web
            sudo /usr/bin/systemctl restart neko-worker

            # ── plugin install + secret (only if neko-vm-setup.sh has run) ──
            # The setup script provisions /opt/neko/.plugins, installs the
            # openneko binary, and writes the systemd drop-in. If it hasn't
            # run yet, skip this block — deploy still succeeds, slack just
            # isn't wired until setup is done once.
            if command -v openneko >/dev/null 2>&1 && [ -d /opt/neko/.plugins ]; then
              export OPENNEKO_PLUGIN_INSTALL_DIR=/opt/neko/.plugins
              export OPENNEKO_PLUGINS_MANIFEST_PATH=/opt/neko/.plugins/openneko.plugins.json
              [ -f "$OPENNEKO_PLUGINS_MANIFEST_PATH" ] || openneko init
              if ! openneko list 2>/dev/null | grep -q '@open-neko/plugin-slack'; then
                openneko install @open-neko/plugin-slack --skip-host-check
              fi
              if [ -n "${SLACK_BOT_TOKEN:-}" ]; then
                openneko secrets set @open-neko/plugin-slack SLACK_BOT_TOKEN "$SLACK_BOT_TOKEN"
                echo "[deploy] SLACK_BOT_TOKEN saved"
              else
                echo "[deploy] SLACK_BOT_TOKEN secret not set in CI; slack auth not wired"
              fi
              # Worker's poll fallback picks up manifest+secrets changes
              # within 3s — no restart needed.
            else
              echo "[deploy] skipping plugin install — run scripts/neko-vm-setup.sh on the VM once to enable"
            fi
          EOF

      - name: Smoke test
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "http://$SSH_HOST/" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "307" ] || [ "$code" = "302" ]; then
              echo "web responded with $code"
              exit 0
            fi
            echo "attempt $i: web returned $code, retrying in 3s"
            sleep 3
          done
          echo "web did not respond after restart"
          exit 1
