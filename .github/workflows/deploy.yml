name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull, build, restart
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GIT_REF: ${{ github.sha }}
          # Slack token piped in from a GitHub secret; the deploy script
          # invokes `openneko secrets set` with it so the running worker
          # picks it up on the next manifest refresh. Empty string is
          # tolerated — the deploy still completes, slack just isn't wired.
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o SendEnv=GIT_REF \
              -o SendEnv=SLACK_BOT_TOKEN \
              "$SSH_USER@$SSH_HOST" \
              GIT_REF="$GIT_REF" SLACK_BOT_TOKEN="$SLACK_BOT_TOKEN" \
              bash -se <<'EOF'
            set -euo pipefail
            cd /opt/neko
            git fetch origin main
            git reset --hard "$GIT_REF"
            export AX_SKIP_SKILL_INSTALL=1
            pnpm install --frozen-lockfile
            pnpm build

            # ── plugin install dir + seed package.json (idempotent) ──
            # OPENNEKO_PLUGIN_INSTALL_DIR=/opt/neko/.plugins keeps plugin
            # npm installs out of /opt/neko/node_modules (which is pnpm-
            # managed and breaks npm's Arborist on plugin install).
            mkdir -p /opt/neko/.plugins
            if [ ! -f /opt/neko/.plugins/package.json ]; then
              printf '{\n  "name": "openneko-plugins",\n  "version": "0.0.0",\n  "private": true\n}\n' \
                > /opt/neko/.plugins/package.json
            fi

            # ── systemd drop-in for OPENNEKO_PLUGIN_INSTALL_DIR (idempotent) ──
            DROPIN=/etc/systemd/system/neko-worker.service.d/openneko-plugins.conf
            if ! sudo test -f "$DROPIN" || ! sudo grep -q OPENNEKO_PLUGIN_INSTALL_DIR "$DROPIN"; then
              sudo mkdir -p "$(dirname "$DROPIN")"
              echo '[Service]' | sudo tee "$DROPIN" > /dev/null
              echo 'Environment="OPENNEKO_PLUGIN_INSTALL_DIR=/opt/neko/.plugins"' | sudo tee -a "$DROPIN" > /dev/null
              sudo /usr/bin/systemctl daemon-reload
              echo "[deploy] systemd drop-in installed at $DROPIN"
            fi

            # ── openneko binary on PATH (idempotent, refreshes on version bump) ──
            # Plugin installs proxy into a worker container when one is
            # running; this VM uses systemd, so installs run locally.
            # OPENNEKO_PLUGIN_INSTALL_DIR points them at /opt/neko/.plugins.
            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64) GOARCH=amd64 ;;
              aarch64|arm64) GOARCH=arm64 ;;
              *) echo "[deploy] unsupported arch: $ARCH"; exit 1 ;;
            esac
            LATEST=$(curl -fsSL https://api.github.com/repos/open-neko/neko/releases/latest | grep -oE '"tag_name":\s*"[^"]+"' | head -1 | cut -d'"' -f4)
            INSTALLED=$(openneko version 2>/dev/null || echo "none")
            WANTED="${LATEST#v}"
            if [ "$INSTALLED" != "$WANTED" ]; then
              echo "[deploy] installing openneko $LATEST (had: $INSTALLED)"
              TMP=$(mktemp -d)
              curl -fsSL -o "$TMP/openneko.tar.gz" \
                "https://github.com/open-neko/neko/releases/download/$LATEST/openneko_${WANTED}_linux_${GOARCH}.tar.gz"
              tar -xzf "$TMP/openneko.tar.gz" -C "$TMP" openneko
              sudo install -m 0755 "$TMP/openneko" /usr/local/bin/openneko
              rm -rf "$TMP"
            else
              echo "[deploy] openneko $LATEST already installed"
            fi

            set -a
            source .env
            set +a
            pnpm -F @neko/db migrate

            sudo /usr/bin/systemctl restart neko-web
            sudo /usr/bin/systemctl restart neko-worker

            # ── slack plugin install + secret (idempotent) ──
            # Happens AFTER the worker restart so the new
            # OPENNEKO_PLUGIN_INSTALL_DIR env is live. Plugin manifest +
            # secrets file changes hot-reload via the registry's poll
            # fallback (200ms debounce, 3s poll); no second restart needed.
            export OPENNEKO_PLUGIN_INSTALL_DIR=/opt/neko/.plugins
            export OPENNEKO_PLUGINS_MANIFEST_PATH=/opt/neko/.plugins/openneko.plugins.json
            if [ ! -f "$OPENNEKO_PLUGINS_MANIFEST_PATH" ]; then
              openneko init
            fi
            if ! openneko list 2>/dev/null | grep -q '@open-neko/plugin-slack'; then
              openneko install @open-neko/plugin-slack --skip-host-check
            else
              echo "[deploy] @open-neko/plugin-slack already installed"
            fi
            if [ -n "${SLACK_BOT_TOKEN:-}" ]; then
              openneko secrets set @open-neko/plugin-slack SLACK_BOT_TOKEN "$SLACK_BOT_TOKEN"
              echo "[deploy] SLACK_BOT_TOKEN saved to secrets store"
            else
              echo "[deploy] SLACK_BOT_TOKEN secret not set; slack plugin installed but won't authenticate"
            fi
          EOF

      - name: Smoke test
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "http://$SSH_HOST/" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "307" ] || [ "$code" = "302" ]; then
              echo "web responded with $code"
              exit 0
            fi
            echo "attempt $i: web returned $code, retrying in 3s"
            sleep 3
          done
          echo "web did not respond after restart"
          exit 1
