name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull, build, restart
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GIT_REF: ${{ github.sha }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              "$SSH_USER@$SSH_HOST" \
              GIT_REF="$GIT_REF" SLACK_BOT_TOKEN="$SLACK_BOT_TOKEN" TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
              bash -se <<'EOF'
            set -euo pipefail
            cd /opt/neko
            git fetch origin main
            git reset --hard "$GIT_REF"
            export AX_SKIP_SKILL_INSTALL=1
            pnpm install --frozen-lockfile
            pnpm build

            # Keep the openneko CLI in lockstep with releases. It ships
            # separately from the app (GitHub Releases, installed by
            # neko-vm-setup.sh), so without this the binary silently drifts
            # behind the app — a stale CLI corrupts channel-plugin installs.
            # Fully non-fatal: a missing release asset must never block a deploy.
            {
              ARCH=$(uname -m)
              case "$ARCH" in x86_64) GOARCH=amd64 ;; aarch64|arm64) GOARCH=arm64 ;; *) GOARCH=amd64 ;; esac
              LATEST=$(curl -fsSL https://api.github.com/repos/open-neko/openneko/releases/latest \
                | grep -oE '"tag_name":[[:space:]]*"[^"]+"' | head -1 | cut -d'"' -f4 || true)
              INSTALLED=$(openneko version 2>/dev/null || echo none)
              if [ -n "${LATEST:-}" ] && [ "${LATEST#v}" != "$INSTALLED" ]; then
                TMP=$(mktemp -d)
                if curl -fsSL -o "$TMP/o.tgz" \
                     "https://github.com/open-neko/openneko/releases/download/$LATEST/openneko_${LATEST#v}_linux_${GOARCH}.tar.gz" \
                   && tar -xzf "$TMP/o.tgz" -C "$TMP" openneko; then
                  sudo install -m 0755 "$TMP/openneko" /usr/local/bin/openneko
                  echo "[deploy] openneko CLI updated to $LATEST (was $INSTALLED)"
                else
                  echo "[deploy] WARNING: openneko $LATEST release binary missing; CLI stays at $INSTALLED"
                fi
                rm -rf "$TMP"
              else
                echo "[deploy] openneko CLI already current ($INSTALLED)"
              fi
            } || echo "[deploy] openneko CLI refresh skipped (non-fatal)"

            set -a
            source .env
            set +a
            openneko migrate

            sudo /usr/bin/systemctl restart neko-web
            sudo /usr/bin/systemctl restart neko-worker

            if command -v openneko >/dev/null 2>&1 && [ -d /opt/neko/.plugins ]; then
              export OPENNEKO_PLUGIN_INSTALL_DIR=/opt/neko/.plugins
              export OPENNEKO_PLUGINS_MANIFEST_PATH=/opt/neko/.plugins/openneko.plugins.json
              [ -f "$OPENNEKO_PLUGINS_MANIFEST_PATH" ] || openneko init
              if [ -n "${SLACK_BOT_TOKEN:-}" ]; then
                openneko secrets set @open-neko/plugin-slack SLACK_BOT_TOKEN "$SLACK_BOT_TOKEN"
                echo "[deploy] SLACK_BOT_TOKEN saved"
              else
                echo "[deploy] SLACK_BOT_TOKEN secret not set in CI; slack install will be skipped"
              fi
              if [ -n "${SLACK_BOT_TOKEN:-}" ]; then
                openneko install @open-neko/plugin-slack --skip-host-check
              fi
              if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -f /opt/neko/scripts/install-telegram-channel.sh ]; then
                bash /opt/neko/scripts/install-telegram-channel.sh \
                  || echo "[deploy] telegram channel install non-fatal failure"
              fi
            else
              echo "[deploy] skipping plugin install — run scripts/neko-vm-setup.sh on the VM once to enable"
            fi
          EOF

      - name: Smoke test
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "http://$SSH_HOST/" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "307" ] || [ "$code" = "302" ]; then
              echo "web responded with $code"
              exit 0
            fi
            echo "attempt $i: web returned $code, retrying in 3s"
            sleep 3
          done
          echo "web did not respond after restart"
          exit 1
