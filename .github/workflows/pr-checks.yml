name: PR checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    # Postgres backs the integration tests in packages/db/test/integration and
    # the Postgres-gated tests in apps/web|worker. Defaults (user=neko,
    # password=secret, database=neko) match packages/db/src/connection.ts so
    # the runtime config falls back to them without needing a config.json.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neko
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: neko
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neko"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: AX_SKIP_SKILL_INSTALL=1 pnpm install --frozen-lockfile

      # The agent runtime shells out to these binaries. Both backends check
      # for `graphjin` on PATH; ClaudeAgentBackend's constructor checks for
      # `claude`. Tests that build a real backend or call runChatTurn fail
      # without them. Mirrors the Dockerfile cli layer.
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install graphjin CLI
        env:
          GRAPHJIN_VERSION: "3.18.17"
        run: |
          curl -fsSL -o /tmp/graphjin.tgz \
            "https://github.com/dosco/graphjin/releases/download/v${GRAPHJIN_VERSION}/graphjin_${GRAPHJIN_VERSION}_linux_amd64.tar.gz"
          sudo tar -xzf /tmp/graphjin.tgz -C /usr/local/bin graphjin
          graphjin version


      - name: Run migrations
        env:
          NEKO_PG_HOST: localhost
          NEKO_PG_PORT: "5432"
          NEKO_PG_USER: neko
          NEKO_PG_PASSWORD: secret
          NEKO_PG_DATABASE: neko
        run: node packages/db/src/migrate.mjs

      # Typecheck apps/web + apps/worker. Deploy runs `pnpm build`, which
      # invokes next build → tsc; PR checks otherwise only run vitest, so a
      # type error in workspace code (e.g. packages/llm) can slip through and
      # break VM deploy on main. tsc --noEmit reproduces that gate cheaply.
      - name: Typecheck
        run: pnpm -r --if-present typecheck

      # Mirror the deploy gate. tsc above catches type errors, but next build's
      # prerender pass surfaces runtime errors that tsc can't see (e.g.
      # useSearchParams without a Suspense boundary). Without this step, those
      # only fail on the VM after push to main.
      - name: Build
        run: pnpm -r build

      - name: Test
        env:
          NEKO_PG_HOST: localhost
          NEKO_PG_PORT: "5432"
          NEKO_PG_USER: neko
          NEKO_PG_PASSWORD: secret
          NEKO_PG_DATABASE: neko
          AGENT_AUTO_MEMORY: "off"
        # --workspace-concurrency=1 runs each package's test script
        # sequentially. apps/web and apps/worker both touch the same
        # Postgres; the worker's reconciler scans `processing_job` rows
        # globally (no org filter), so when it ran in parallel with
        # apps/web's onboarding tests it marked their newly-inserted
        # business_profile_build rows as "lost from queue (failed)".
        run: pnpm -r --workspace-concurrency=1 test
