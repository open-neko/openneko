name: PR checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: neko
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: neko
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neko"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/openneko/go.sum

      - name: Install
        run: AX_SKIP_SKILL_INSTALL=1 pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install graphjin CLI
        env:
          GRAPHJIN_VERSION: "3.18.25"
        run: |
          curl -fsSL -o /tmp/graphjin.tgz \
            "https://github.com/dosco/graphjin/releases/download/v${GRAPHJIN_VERSION}/graphjin_${GRAPHJIN_VERSION}_linux_amd64.tar.gz"
          sudo tar -xzf /tmp/graphjin.tgz -C /usr/local/bin graphjin
          graphjin version


      - name: Run migrations
        env:
          NEKO_PG_HOST: localhost
          NEKO_PG_PORT: "5432"
          NEKO_PG_USER: neko
          NEKO_PG_PASSWORD: secret
          NEKO_PG_DATABASE: neko
        working-directory: apps/openneko
        run: go run ./cmd/openneko migrate

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        env:
          NEKO_PG_HOST: localhost
          NEKO_PG_PORT: "5432"
          NEKO_PG_USER: neko
          NEKO_PG_PASSWORD: secret
          NEKO_PG_DATABASE: neko
          AGENT_AUTO_MEMORY: "off"
        # apps/web and apps/worker share Postgres; worker's reconciler scans processing_job globally and races with web's onboarding tests.
        run: pnpm -r --workspace-concurrency=1 test
