name: post-release smoke

# Smoke-test the assembled stack against the multi-arch images that
# release-binaries.yml just pushed. This replaces the per-main-push
# `integration-supervisor` job in go.yml — that version tried to use
# locally-built `:ci-smoke` tags and lost the race with compose's
# default pull-from-registry policy (`manifest unknown` flakes).
#
# Triggered after release-binaries.yml succeeds. The release version
# is taken from the just-published tag. If the stack fails to come up
# against the new images, this workflow's failure is the operator-
# visible signal: a release is bad and the homebrew tap should be
# yanked (or release-please should not advance).

on:
  workflow_run:
    workflows: ["openneko release binaries"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to smoke-test (e.g. v1.11.4). Defaults to :latest."
        required: false
        default: "latest"

jobs:
  smoke:
    name: post-release supervisor smoke
    runs-on: ubuntu-22.04
    # Only run when release-binaries actually succeeded (workflow_run
    # fires for failure too) OR when manually dispatched.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run, check out the SHA the release-binaries run
          # was built from (so the openneko binary + compose match the
          # images being tested).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/openneko/go.sum

      - name: Resolve image tag
        id: tag
        run: |
          set -euxo pipefail
          # workflow_run carries head_branch/sha but not the release tag.
          # Derive the tag from the head_sha via the GH API, falling back
          # to `latest` for manual dispatches without a version input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tag=$(gh api "repos/${{ github.repository }}/releases" \
            --jq '.[] | select(.target_commitish=="main") | .tag_name' \
            | head -1)
          if [ -z "$tag" ]; then
            echo "no release tag found; defaulting to :latest"
            tag="latest"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build openneko binary
        working-directory: apps/openneko
        run: go build -o /usr/local/bin/openneko ./cmd/openneko

      # Pre-pull each image sequentially with retry+backoff. release-binaries
      # publishes manifests via `docker buildx imagetools create` and GHCR's
      # replicas are briefly inconsistent — a `docker manifest inspect` against
      # one replica can succeed while a parallel `docker compose up` pull hits
      # another replica that doesn't yet have the manifest list, surfacing as
      # `<service> Error manifest unknown` for a random service every run.
      # Pulling explicitly (one image at a time, retrying transient pulls)
      # populates the local cache so compose's default pull_policy=missing
      # skips the racy re-pull at `openneko start` time.
      - name: Pre-pull images with retry
        run: |
          set -euxo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          # core.yml's neko-db service uses pgvector/pgvector:pg16. With
          # `openneko start --pull never` below, compose can't fetch it
          # on its own, so it has to be in the local cache too.
          refs=(
            "ghcr.io/open-neko/neko-web:${tag}"
            "ghcr.io/open-neko/neko-worker:${tag}"
            "ghcr.io/open-neko/neko-graphjin:${tag}"
            "ghcr.io/open-neko/neko-cli:${tag}"
            "pgvector/pgvector:pg16"
          )
          for ref in "${refs[@]}"; do
            for attempt in 1 2 3 4 5; do
              if docker pull "${ref}"; then
                break
              fi
              if [ "${attempt}" = "5" ]; then
                echo "pull of ${ref} failed after 5 attempts" >&2
                exit 1
              fi
              echo "pull attempt ${attempt} for ${ref} failed; sleeping 10s"
              sleep 10
            done
          done

      # `docker compose up` verifies each service's image manifest against
      # the registry in parallel even when the image is already cached
      # locally, so the pre-pull above isn't sufficient on its own — one
      # random service still trips on `manifest unknown` when its verify
      # hits a GHCR replica that hasn't seen the manifest list yet.
      # `--pull never` tells compose to skip the registry check entirely
      # and use only the cached images we just pulled.
      - name: openneko start (detached) against pre-pulled images
        env:
          OPENNEKO_VERSION: ${{ steps.tag.outputs.tag }}
        run: |
          set -euxo pipefail
          openneko start --mode prod --detach --pull never

      - name: openneko status (poll until healthy)
        env:
          OPENNEKO_VERSION: ${{ steps.tag.outputs.tag }}
        run: |
          set -euxo pipefail
          for i in $(seq 1 60); do
            if openneko status | grep -E "running|healthy"; then
              echo "stack is up after ${i} polls"
              exit 0
            fi
            sleep 2
          done
          echo "stack did not come up within 120s — final state:"
          openneko status || true
          openneko logs || true
          exit 1

      - name: openneko stop --volumes
        if: always()
        env:
          OPENNEKO_VERSION: ${{ steps.tag.outputs.tag }}
        run: openneko stop --volumes || true
