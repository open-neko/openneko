services:
  adventureworks-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CUSTOMER_PGUSER:-postgres}
      POSTGRES_PASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${CUSTOMER_PGPORT:-5433}:5432"
    volumes:
      - adventureworks-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${CUSTOMER_PGUSER:-postgres}
      interval: 5s
      timeout: 5s
      retries: 20

  adventureworks-init:
    image: node:20-slim
    depends_on:
      adventureworks-db:
        condition: service_healthy
    environment:
      PGHOST: adventureworks-db
      PGPORT: 5432
      PGUSER: ${CUSTOMER_PGUSER:-postgres}
      PGPASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      ADVENTUREWORKS_DB: ${ADVENTUREWORKS_DB:-adventureworks}
      ADVENTUREWORKS_CACHE_DIR: /cache
      ADVENTUREWORKS_INSTALL_SQL: /workspace/db/seeds/dev/adventureworks-install.sql
    entrypoint:
      - /bin/sh
      - /workspace/db/load-adventureworks.sh
    restart: "no"
    volumes:
      - ./:/workspace:ro
      - adventureworks-cache:/cache

  graphjin-config-init:
    image: alpine:3.20
    volumes:
      - graphjin-config:/config
      - ./db/graphjin/dev.example.yml:/seed/dev.yml:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -f /config/dev.yml ]; then
          cp /seed/dev.yml /config/dev.yml
        fi
        chmod -R a+rwX /config
    restart: "no"

  graphjin:
    image: dosco/graphjin:3.18.25
    restart: unless-stopped
    depends_on:
      adventureworks-init:
        condition: service_completed_successfully
      graphjin-config-init:
        condition: service_completed_successfully
    ports:
      - "${GRAPHJIN_PORT:-8080}:8080"
    environment:
      GJ_DATABASE_HOST: adventureworks-db
      GJ_DATABASE_PORT: 5432
      GJ_DATABASE_USER: ${CUSTOMER_PGUSER:-postgres}
      GJ_DATABASE_PASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      GJ_DATABASE_DBNAME: ${ADVENTUREWORKS_DB:-adventureworks}
      NO_PROXY: localhost,127.0.0.1,::1,adventureworks-db,graphjin,neko-db,worker,web,host.docker.internal,host.internal
      no_proxy: localhost,127.0.0.1,::1,adventureworks-db,graphjin,neko-db,worker,web,host.docker.internal,host.internal
    volumes:
      - graphjin-config:/config
    command: ["serve", "--path", "/config"]

  adventureworks-simulator:
    # Trial-experience simulator: trickles realistic sales orders into the
    # AdventureWorks DB on a schedule so the workspace reacts during a trial
    # (briefing numbers drift, cron workflows fire, runs accumulate).
    # Default: a small batch every 10 minutes. Override via AW_SIM_* env vars.
    # Set AW_SIM_ENABLED=0 to disable.
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      adventureworks-init:
        condition: service_completed_successfully
    environment:
      PGHOST: adventureworks-db
      PGPORT: 5432
      PGUSER: ${CUSTOMER_PGUSER:-postgres}
      PGPASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      PGDATABASE: ${ADVENTUREWORKS_DB:-adventureworks}
      AW_SIM_INTERVAL_SEC: ${AW_SIM_INTERVAL_SEC:-600}
      AW_SIM_ORDERS_MIN: ${AW_SIM_ORDERS_MIN:-3}
      AW_SIM_ORDERS_MAX: ${AW_SIM_ORDERS_MAX:-10}
      AW_SIM_ENABLED: ${AW_SIM_ENABLED:-1}
    volumes:
      - ./db/seeds/dev/aw-sim-tick.sql:/scripts/aw-sim-tick.sql:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ "${AW_SIM_ENABLED}" != "1" ]; then
          echo "[aw-sim] AW_SIM_ENABLED=${AW_SIM_ENABLED}; sleeping forever"
          exec tail -f /dev/null
        fi
        echo "[aw-sim] starting: interval=${AW_SIM_INTERVAL_SEC}s, orders=${AW_SIM_ORDERS_MIN}-${AW_SIM_ORDERS_MAX} per tick"
        while true; do
          ORDERS=$$(awk -v mn=${AW_SIM_ORDERS_MIN} -v mx=${AW_SIM_ORDERS_MAX} 'BEGIN{srand(); print int(mn + rand()*(mx-mn+1))}')
          psql -v ON_ERROR_STOP=1 -c "SET trial_sim.orders_per_tick TO '$$ORDERS'" -f /scripts/aw-sim-tick.sql \
            || echo "[aw-sim] tick failed; will retry next interval"
          sleep "${AW_SIM_INTERVAL_SEC}"
        done

  adventureworks-scenario-injector:
    # L3 scripted-scenario injector. Lives entirely in this container: the
    # scheduler loop, the scenario SQL, and the CLI subcommands are all
    # in db/seeds/dev/. No edits to apps/web or apps/worker — operator
    # demo controls are invoked via `docker compose exec` (see
    # docs/TRIAL_SIM_L3.md).
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      adventureworks-init:
        condition: service_completed_successfully
    environment:
      PGHOST: adventureworks-db
      PGPORT: 5432
      PGUSER: ${CUSTOMER_PGUSER:-postgres}
      PGPASSWORD: ${CUSTOMER_PGPASSWORD:-postgres}
      PGDATABASE: ${ADVENTUREWORKS_DB:-adventureworks}
      TRIAL_SIM_TICK_SEC: ${TRIAL_SIM_TICK_SEC:-300}
      TRIAL_SIM_ENABLED: ${TRIAL_SIM_ENABLED:-1}
    volumes:
      - ./db/seeds/dev/trial-sim-schema.sql:/scripts/trial-sim-schema.sql:ro
      - ./db/seeds/dev/advance-dates.sql:/scripts/advance-dates.sql:ro
      - ./db/seeds/dev/scenario-injector.sh:/scripts/scenario-injector.sh:ro
      - ./db/seeds/dev/scenarios:/scripts/scenarios:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ "$${TRIAL_SIM_ENABLED}" != "1" ]; then
          echo "[trial-sim] TRIAL_SIM_ENABLED=$${TRIAL_SIM_ENABLED}; sleeping forever"
          exec tail -f /dev/null
        fi
        exec /bin/sh /scripts/scenario-injector.sh loop

  neko-adventureworks-seed:
    build:
      context: .
      target: worker
    depends_on:
      # Worker's healthcheck only flips green AFTER its entrypoint runs
      # `openneko migrate`, so this is our schema-is-ready signal — the seed
      # writes into organization / data_source / onboarding_wizard / workflow
      # tables that the migrator just produced.
      worker:
        condition: service_healthy
      adventureworks-init:
        condition: service_completed_successfully
    environment:
      XDG_CONFIG_HOME: /config
      NEKO_PG_HOST: neko-db
      NEKO_PG_PORT: "5432"
      NEKO_PG_USER: neko
      NEKO_PG_PASSWORD: secret
      NEKO_PG_DATABASE: neko
      NO_PROXY: localhost,127.0.0.1,::1,neko-db,worker,web,graphjin,adventureworks-db,host.docker.internal,host.internal
      no_proxy: localhost,127.0.0.1,::1,neko-db,worker,web,graphjin,adventureworks-db,host.docker.internal,host.internal
    volumes:
      - openneko-config:/config/openneko
    command: ["node", "packages/db/src/seed-adventureworks.mjs"]
    restart: "no"

  web:
    depends_on:
      graphjin:
        condition: service_started
    environment:
      # Trial default: route every external action (e.g. send_webhook) to
      # the mock adapter so bundled workflows can propose Slack alerts
      # without hitting real endpoints. Flip to "false" once you're past
      # trial and have wired real webhooks.
      NEKO_ACTIONS_DRY_RUN: ${NEKO_ACTIONS_DRY_RUN:-true}

  worker:
    depends_on:
      graphjin:
        condition: service_started
    environment:
      NEKO_ACTIONS_DRY_RUN: ${NEKO_ACTIONS_DRY_RUN:-true}

volumes:
  adventureworks-db-data:
  adventureworks-cache:
  graphjin-config:
